<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>申し込みページ</title>
    <style>
        /* ページ全体のスタイル（中央配置にするための設定） */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* 画面の高さに合わせる */
            text-align: center;
        }

        /* コンテンツを囲むコンテナのスタイル */
        .container {
            padding: 20px;
        }

        /* タイトル・イベント名のスタイル */
        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
            font-weight: normal;
        }

        /* 申し込みボタン（リンク）のスタイル */
        .btn-link {
            display: inline-block;
            text-decoration: none;
            background-color: #007bff; /* ボタンの色（青） */
            color: #fff; /* 文字の色（白） */
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 4px; /* 角の丸み */
            transition: background-color 0.3s ease;
        }

        /* ボタンにマウスを乗せたときの効果 */
        .btn-link:hover {
            background-color: #0056b3; /* 少し濃い青になる */
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- イベント名や見出し（必要に応じて書き換えてください） -->
        <h1>【東京】「 INUWASI birthday live - カリヲリ - 」</h1>
        
        <!-- イープラスの申し込みリンク -->
        <a href="https://eplus.jp/sf/detail/4017580001?P6=777" class="btn-link">申し込みへ</a>
    </div>

</body>
</html>
